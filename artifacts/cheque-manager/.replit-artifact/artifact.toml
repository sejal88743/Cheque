kind = "web"
previewPath = "/"
title = "Cheque Entry Manager"
version = "1.0.0"
id = "artifacts/cheque-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25347

[services.development]
run = "pnpm --filter @workspace/cheque-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cheque-manager", "run", "build" ]
publicDir = "artifacts/cheque-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25347"
BASE_PATH = "/"
